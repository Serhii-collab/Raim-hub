<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raim Hub</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#111,#1d1d1d,#292929);
color:white;
overflow:hidden;
}
.container{
text-align:center;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:25px;
box-shadow:0 0 30px rgba(255,255,255,0.1);
}
h1{
font-size:60px;
margin-bottom:10px;
}
p{
margin-bottom:25px;
color:#ccc;
}
.link{
display:block;
width:250px;
margin:10px auto;
padding:15px;
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
transition:0.3s;
}
.link:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.1);
}
</style>
</head>
<body>
<div class="container">
<h1>RAIM HUB</h1>
<p>Все мои ссылки в одном месте</p>

TikTok
Twitch
YouTube
Discord

</div>
</body>
</html>
