<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIM HUB</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
padding:30px;
}

.container{
width:100%;
max-width:900px;
}

.banner{
width:100%;
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.15);
margin-bottom:25px;
}

.banner img{
width:100%;
display:block;
}

.profile{
text-align:center;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
background:#111;
border:2px solid rgba(255,255,255,0.2);
margin:auto;
margin-bottom:20px;
}

h1{
font-size:52px;
letter-spacing:4px;
margin-bottom:10px;
}

.subtitle{
color:#bdbdbd;
margin-bottom:35px;
font-size:18px;
}

.links{
display:flex;
flex-direction:column;
gap:15px;
max-width:500px;
margin:auto;
}

.link{
display:block;
padding:18px;
border-radius:15px;
text-decoration:none;
color:white;
background:#111;
border:1px solid rgba(255,255,255,0.15);
transition:0.25s;
font-size:18px;
}

.link:hover{
background:#1b1b1b;
transform:translateY(-2px);
}

.footer{
text-align:center;
margin-top:35px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="Screenshot 2026-06-20 162121.png">
</div>

<div class="profile">

<div class="avatar"></div>

<h1>RAIM</h1>

<div class="subtitle">
Chasing Goals Today. Achieving More Tomorrow.
</div>

<div class="links">

<a class="link" href="https://www.twitch.tv/raim2029" target="_blank">Twitch</a>

<a class="link" href="https://youtube.com/@meloformx" target="_blank">YouTube</a>

<a class="link" href="https://www.tiktok.com/@raim_606" target="_blank">TikTok</a>

<a class="link" href="https://discord.gg/zRzyS6fDKr" target="_blank">Discord</a>

</div>

<div class="footer">
RAIM HUB
</div>

</div>

</div>

</body>
</html>
