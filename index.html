<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIM HUB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
}

.banner{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    margin-bottom:25px;
}

.banner img{
    width:100%;
    display:block;
}

.profile{
    text-align:center;
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
    margin-bottom:20px;
    border:2px solid rgba(255,255,255,0.2);
}

h1{
    font-size:52px;
    letter-spacing:4px;
    margin-bottom:10px;
}

.subtitle{
    color:#bdbdbd;
    margin-bottom:35px;
    font-size:18px;
}.views-counter{
    display:flex;
    justify-content:center;
    margin-top:-15px;
    margin-bottom:30px;
}

.views-counter img{
    border-radius:999px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
    max-width:500px;
    margin:auto;
}

.link{
    display:block;
    padding:18px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    background:#111;
    border:1px solid rgba(255,255,255,0.15);
    font-size:20px;
    transition:0.25s;
}

.link:hover{
    background:#1b1b1b;
    transform:translateY(-2px);
}

.link i{
    margin-right:10px;
    font-size:22px;
}

.twitch i{
    color:#9146FF;
}

.youtube i{
    color:#FF0000;
}

.tiktok i{
    color:#25F4EE;
}

.discord i{
    color:#5865F2;
}

.footer{
    text-align:center;
    margin-top:35px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="Screenshot 2026-06-20 162121.png">
</div>

<div class="profile">

<img class="avatar" src="avatar.png.png" alt="Avatar">

<h1>RAIM</h1>

<div class="subtitle">
Follow all my social media (:
</div> <div class="views-counter">
    <img src="https://hits.sh/serhii-collab.github.io/Raim-hub.svg?style=flat-square&label=👀+Views&color=000000" alt="Views">
</div>
<div class="links">

<a class="link twitch" href="https://www.twitch.tv/raim2029" target="_blank">
<i class="fab fa-twitch"></i> Twitch
</a>

<a class="link youtube" href="https://youtube.com/@meloformx" target="_blank">
<i class="fab fa-youtube"></i> YouTube
</a>

<a class="link tiktok" href="https://www.tiktok.com/@raim_606" target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a class="link discord" href="https://discord.gg/zRzyS6fDKr" target="_blank">
<i class="fab fa-discord"></i> Discord
</a>
</div>

<div class="footer">
RAIM HUB
</div>

</div>

</div>

</body>
</html>
